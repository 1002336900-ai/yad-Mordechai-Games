<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { width: 150px; height: 200px; perspective: 1000px; cursor: pointer; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card.flipped .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 2px solid #2d5a27; display: flex; align-items: center; justify-content: center; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .front { background: rgba(85, 107, 47, 0.7); color: white; font-weight: bold; font-size: 1.2rem; }
        .back { transform: rotateY(180deg); padding: 8px; flex-direction: column; text-align: center; justify-content: space-between; }
        img { object-fit: contain; background: white; width: 100%; height: 100px; }
    </style>
</head>
<body>
    <div class="grid-container" id="grid"></div>
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full text-center border-4 border-green-800">
            <h2 id="modal-name" class="text-2xl font-bold mb-2"></h2>
            <p id="modal-bio" class="text-sm mb-4 leading-relaxed"></p>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="bg-green-800 text-white px-6 py-2 rounded-full text-sm">סגירה</button>
        </div>
    </div>
    <script>
        const baseUrl = "https://raw.githubusercontent.com/1002336900-ai/yad-Mordechai-Games/main/leaders/images/";
        const leaders = [
            { id: 2, name: "אליעזר בן יהודה", bio: "מחיה השפה העברית, שהמציא מילים כמו גלידה, בובה ועגלה." },
            { id: 14, name: "חיים נחמן ביאליק", bio: "המשורר הלאומי, שהשפיע רבות על התרבות העברית החדשה." },
            { id: 21, name: "שמואל יוסף עגנון", bio: "סופר עברי מוערך והאזרח הישראלי הראשון שזכה בפרס נובל לספרות." },
            { id: 11, name: "לאה גולדברג", bio: "משוררת, סופרת וחוקרת ספרות, כלת פרס ישראל." },
            { id: 10, name: "נתן אלתרמן", bio: "משורר ומחזאי חשוב, שלחם במלחמת העצמאות והיה ממייסדי התנועה למען ארץ ישראל השלמה." }
        ];
        const grid = document.getElementById('grid');
        leaders.forEach(l => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="inner"><div class="front">מי אני?</div><div class="back"><img src="${baseUrl}${l.id}.jpeg" class="rounded" onerror="this.src='https://placehold.co/100x100?text=תמונה'"><h3 class="font-bold text-sm truncate">${l.name}</h3><div id="btn-${l.id}"></div></div></div>`;
            card.onclick = () => card.classList.toggle('flipped');
            
            const btn = document.createElement('button');
            btn.className = "bg-green-700 text-white px-2 py-1 rounded text-[10px]";
            btn.innerText = "מה עשיתי?";
            btn.onclick = (e) => { e.stopPropagation(); showModal(l.name, l.bio); };
            card.querySelector(`#btn-${l.id}`).appendChild(btn);
            
            grid.appendChild(card);
        });
        function showModal(n, b) { document.getElementById('modal-name').innerText = n; document.getElementById('modal-bio').innerText = b; document.getElementById('modal').classList.remove('hidden'); }
    </script>
</body>
</html>
