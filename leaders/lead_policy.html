<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fdf6e3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .card { width: 180px; height: 220px; perspective: 1000px; cursor: pointer; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card.flipped .inner { transform: rotateY(180deg); }
       
        /* Realistic wood frame effect */
        .front, .back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 12px;
            border: 12px solid #5d4037; /* Wood frame color */
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
        }
       
        .front {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: #fff; font-weight: bold; font-size: 1.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            border-style: ridge;
        }
       
        .back { transform: rotateY(180deg); padding: 10px; flex-direction: column; text-align: center; justify-content: space-between; background: white; }
        img { object-fit: contain; width: 100%; height: 110px; background: white; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="grid-container" id="grid"></div>
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full text-center border-4 border-blue-900 shadow-2xl">
            <h2 id="modal-name" class="text-2xl font-bold mb-2"></h2>
            <p id="modal-bio" class="text-sm mb-4 leading-relaxed"></p>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="bg-blue-900 text-white px-6 py-2 rounded-full text-sm font-bold">סגירה</button>
        </div>
    </div>
    <script>
        const baseUrl = "https://raw.githubusercontent.com/1002336900-ai/yad-Mordechai-Games/main/leaders/images/";
        const leaders = [
            { id: 8, name: "דוד בן גוריון", bio: "ראש הממשלה הראשון שהכריז על הקמת המדינה. האמין בעבודה קשה ובצבא חזק." },
            { id: 13, name: "חיים ויצמן", bio: "הנשיא הראשון של המדינה. פעל בזירה הבינלאומית להכרה בזכות היהודים למדינה." },
            { id: 3, name: "גולדה מאיר", bio: "ראשת הממשלה הראשונה של ישראל, שהנהיגה את המדינה בתקופות קשות." },
            { id: 19, name: "משה שרת", bio: "שר החוץ הראשון וראש ממשלה, שפעל לשימור קשרי שלום עם מדינות העולם." },
            { id: 18, name: "לוי אשכול", bio: "ראש ממשלה שעסק בפיתוח הכלכלה, תשתיות הכבישים וההתיישבות." },
            { id: 16, name: "אליעזר קפלן", bio: "שר האוצר הראשון, שניהל את תקציב המדינה כשהייתה צעירה וענייה." }
        ];
        const grid = document.getElementById('grid');
        leaders.forEach(l => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="inner"><div class="front">מי אני?</div><div class="back"><img src="${baseUrl}${l.id}.jpeg" onerror="this.src='https://placehold.co/100x100?text=תמונה'"><h3 class="font-bold text-sm truncate w-full">${l.name}</h3><button class="action-btn bg-blue-800 text-white px-3 py-1 rounded text-xs font-bold">מה עשיתי?</button></div></div>`;
            card.onclick = () => card.classList.toggle('flipped');
            card.querySelector('.action-btn').addEventListener('click', (e) => { e.stopPropagation(); showModal(l.name, l.bio); });
            grid.appendChild(card);
        });
        function showModal(n, b) { document.getElementById('modal-name').innerText = n; document.getElementById('modal-bio').innerText = b; document.getElementById('modal').classList.remove('hidden'); }
    </script>
</body>
</html>
