<!DOCTYPE html>
<html lang="he" direction="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפענחי המזוודות - חדר אימרסיבי</title>
    <style>
        :root {
            --ציוני: #2563eb;
            --דתי: #16a34a;
            --כלכלי: #ca8a04;
            --ביטחוני: #dc2626;
            --bg-color: #000000;
        }

        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: #ffffff; direction: rtl; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .main-frame { width: 94vw; height: 92vh; background-image: radial-gradient(circle at center, #2a2a3c 0%, #11111a 100%); border: 6px solid #4b5563; border-radius: 30px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        header { text-align: center; padding: 2vh; background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%); }
        header h1 { margin: 0; font-size: 2.5rem; color: #f3f4f6; }
        .game-container { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5vw; padding: 1.5vw; }
        .suitcase-card { background: linear-gradient(135deg, #3f3f46 0%, #27272a 100%); border: 4px solid #52525b; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s; padding: 20px; }
        .suitcase-card:hover { transform: translateY(-5px); border-color: #a1a1aa; }
        .suitcase-card.solved { border-color: #22c55e; background: linear-gradient(135deg, #14532d 0%, #052e16 100%); cursor: default; opacity: 0.6; }
        .suitcase-icon { font-size: 3rem; margin-bottom: 5px; }
        .suitcase-label { font-size: 1.1rem; font-weight: bold; color: #e4e4e7; }
        
        /* חלונית פופ-אפ שמכסה את המסך */
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        
        /* תוכן הפופ אפ - מוגבל בגובה כדי שלא יגלוש */
        .popup-content { background-color: #27272a; border: 5px solid #a1a1aa; border-radius: 20px; width: 85%; height: 90%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 25px; }
        
        /* מיכל התמונה - תופס את רוב המקום */
        .popup-image-container { width: 100%; height: 65%; background-color: #18181b; border-radius: 10px; overflow: hidden; display: flex; justify-content: center; align-items: center; border: 2px solid #3f3f46; }
        .popup-image { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* סרגל כפתורי הבחירה בתוך הפופ אפ */
        .keys-container { width: 100%; background-color: #11111b; padding: 15px; display: flex; justify-content: center; gap: 1.5vw; border-radius: 12px; margin-top: 10px; }
        .key-button { padding: 1.5vh 3vw; font-size: 1.3rem; font-weight: bold; color: white; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.2s; }
        .key-button:hover { transform: scale(1.05); }
        .key-btn-ציוני { background-color: var(--ציוני); }
        .key-btn-דתי { background-color: var(--דתי); }
        .key-btn-כלכלי { background-color: var(--כלכלי); }
        .key-btn-ביטחוני { background-color: var(--ביטחוני); }
        
        .victory-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(9, 9, 11, 0.98); z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>

        </header>

                    <button class="key-button key-btn-ציוני" onclick="checkAnswer('ציוני')">ציוני</button>

                    <button class="key-button key-btn-ביטחוני" onclick="checkAnswer('ביטחוני')">ביטחוני</button>
                </div>
            </div>
        </div>

        <div class="victory-screen" id="victoryScreen">

                <img src="images/picture14.png" style="width: 100%; height: auto; object-fit: contain;" alt="ניצחון">
            </div>
        </div>
    </div>
