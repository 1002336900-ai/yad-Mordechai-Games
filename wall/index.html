<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כותל הערכים - בנייה משותפת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Assistant', sans-serif;
            background-color: #fdfaf3;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: calc(100vh - 100px);
        }

        #scroll-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            width: 100%;
            scroll-behavior: smooth;
        }

        #capture-area {
            background: #fdfaf3;
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 20px;
            min-height: 100%;
        }

        .header { 
            text-align: center; 
            padding-bottom: 20px;
            color: #1a0a00; 
        }

        .kotel-canvas {
            width: 98%; 
            max-width: 1600px;
            margin: 0 auto;
            
            /* --- השינוי החדש: טעינת מפת העולם ישירות מגיטאהב --- */
            background-image: url('YOUR_GITHUB_RAW_IMAGE_URL'); 
            background-size: cover;       /* גורם לתמונת המפה להתפרס על כל הלוח */
            background-position: center;  /* ממקם את המפה במרכז הלוח */
            background-repeat: no-repeat; /* מונע שכפול של התמונה */
            
            border-bottom: 12px solid #2d1606;
            display: flex;
            flex-wrap: wrap-reverse;
            justify-content: center; 
            align-content: flex-start;
            padding: 20px;
            gap: 10px;
            border-radius: 15px 15px 0 0;
            min-height: 450px;
        }

        .stone {
            border: 1px solid rgba(0,0,0,0.15);
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: stonePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* Dynamic sizes based on count */
        .stone.size-large { width: calc(25% - 10px); min-height: 140px; }
        .stone.size-medium { width: calc(20% - 10px); min-height: 120px; }
        .stone.size-small { width: calc(15% - 10px); min-height: 100px; padding: 6px; }
        .stone.size-mini { width: calc(12% - 10px); min-height: 85px; padding: 4px; }

        .stone-site { font-weight: 700; color: rgba(0,0,0,0.55); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stone-value { font-weight: 900; color: #1a0a00; margin-bottom: 4px; }
        .stone-action { font-style: italic; color: #2d1606; line-height: 1.2; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 5px; font-weight: 700; }

        .size-large .stone-site { font-size: 0.8rem; }
        .size-large .stone-value { font-size: 1.6rem; }
        .size-large .stone-action { font-size: 1.1rem; }

        .size-medium .stone-site { font-size: 0.7rem; }
        .size-medium .stone-value { font-size: 1.35rem; }
        .size-medium .stone-action { font-size: 0.95rem; }

        .size-small .stone-site { font-size: 0.6rem; }
        .size-small .stone-value { font-size: 1.15rem; }
        .size-small .stone-action { font-size: 0.8rem; }

        .size-mini .stone-site { font-size: 0.55rem; }
        .size-mini .stone-value { font-size: 1rem; }
        .size-mini .stone-action { font-size: 0.7rem; }

        .export-mode .stone-site, 
        .export-mode .stone-value, 
        .export-mode .stone-action { 
            color: #000000 !important; 
        }

        @keyframes stonePop {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .footer-quote-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 40px 0;
            margin-top: auto;
        }

        .footer-quote-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 15px 50px;
            border: 3px solid #2d1606;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-width: 850px;
        }

        .footer-quote-text {
            color: #000;
            font-weight: 800;
            font-size: 1.6rem;
            margin: 0;
            text-align: center;
        }

        .control-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1a0a00;
            padding: 12px 20px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 90px;
            z-index: 1000;
        }

        select, input {
            height: 48px;
            border-radius: 10px;
            border: 2px solid #d4a373;
            font-size: 1.1rem;
            padding: 0 12px;
            color: #1a0a00;
            background: #fff;
            font-weight: 700;
        }

        .site-select { width: 140px; }
        .value-select { width: 110px; }
        .action-input { flex-grow: 1; max-width: 300px; }

        .btn {
            height: 48px;
            padding: 0 16px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-add { background: #d4a373; color: #1a0a00; border: 2px solid #bc8a5f; }
        .btn-save { background: #5d4037; color: #fdfaf3; border: 2px solid #3e2723; }
        .btn-reset { background: #d4a373; color: #1a0a00; border: 2px solid #bc8a5f; }
        .btn-fullscreen { background: #1a0a00; color: #d4a373; border: 2px solid #d4a373; }
        
        #confirm-dialog {
            display: none;
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; border: 4px solid #1a0a00;
            z-index: 3000; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #loader {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center;
            color: white;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="scroll-wrapper">
            <div id="capture-area">
                <div class="header">
                    <h1 class="text-4xl font-extrabold mb-2">אבנים עם לב: בונים את כותל הערכים</h1>
                    <p class="text-xl font-semibold opacity-90">כל מעשה קטן וטוב הוא אבן בבניין ירושלים שלנו</p>
                </div>

                <div id="kotel" class="kotel-canvas">
                    </div>

                <div class="footer-quote-wrapper">
                    <div class="footer-quote-box">
                        <p class="footer-quote-text">ערכים גדולים מתבטאים במעשים יומיומיים פשוטים</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-bar">
        <select id="site" class="site-select" onchange="updateValues()">
            <option value="" disabled selected>אתר...</option>
            <option value="הכותל המערבי">הכותל המערבי</option>
            <option value="עיר דוד">עיר דוד</option>
            <option value="גבעת התחמושת">גבעת התחמושת</option>
            <option value="יד ושם">יד ושם</option>
            <option value="משכן הכנסת">משכן הכנסת</option>
            <option value="שוק מחנה יהודה">שוק מחנה יהודה</option>
            <option value="שער האריות">שער האריות</option>
            <option value="מוזיאון ישראל">מוזיאון ישראל</option>
            <option value="מנהרות הכותל">מנהרות הכותל</option>
        </select>

        <select id="value" class="value-select">
            <option value="" disabled selected>ערך...</option>
        </select>

        <input type="text" id="action" class="action-input" placeholder="מעשה טוב שעשיתי...">
        
        <button onclick="addStone()" class="btn btn-add">🧱 הנח אבן</button>
        <button onclick="saveAsImage()" class="btn btn-save">📸 שמור</button>
        <button onclick="toggleFullscreen()" class="btn btn-fullscreen">⛶ מסך מלא</button>
        <button onclick="showResetDialog()" class="btn btn-reset">🔄</button>
    </div>

    <div id="confirm-dialog">
        <h2 class="text-2xl font-bold mb-4">איפוס הכותל?</h2>
        <p class="mb-6">פעולה זו תמחק את כל האבנים שהוספתם.</p>
        <div class="flex gap-4 justify-center">
            <button onclick="resetWall()" class="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">כן, מחק הכל</button>
            <button onclick="closeResetDialog()" class="bg-gray-300 px-6 py-2 rounded-lg font-bold">ביטול</button>
        </div>
    </div>

    <div id="loader">
        <div class="text-6xl mb-4 animate-bounce">🏛️</div>
        <div class="text-2xl font-bold">מייצר תמונה איכותית...</div>
    </div>

    <script>
        const siteValues = {
            "הכותל המערבי": ["אמונה", "תקווה", "תפילה", "קדושה", "מסורת", "כיסופים"],
            "עיר דוד": ["חלוציות", "שורשים", "תגלית", "מנהיגות", "עמידות", "המשכיות"],
            "גבעת התחמושת": ["גבורה", "רעות", "אומץ לב", "הקרבה", "ריבונות", "דבקות"],
            "יד ושם": ["זיכרון", "תקומה", "ערבות הדדית", "מוסר", "אנושיות", "אחריות"],
            "משכן הכנסת": ["דמוקרטיה", "אחריות לאומית", "דיאלוג", "שירות הציבור", "חקיקה"],
            "שוק מחנה יהודה": ["סובלנות", "שמחה", "רב-תרבותיות", "נדיבות", "קהילתיות"],
            "שער האריות": ["נחישות", "פריצת דרך", "היסטוריה", "מורשת קרב", "אחדות"],
            "מוזיאון ישראל": ["השראה", "יצירתיות", "יופי", "סקרנות", "דעת"],
            "מנהרות הכותל": ["חשיפת האמת", "סבלנות", "דיוק", "יראת כבוד", "מצוינות"]
        };

        const stoneColorFamilies = [
            ["linear-gradient(145deg, #a88a64, #7d5a3c)", "linear-gradient(145deg, #c4a484, #967959)", "linear-gradient(145deg, #8d6e63, #5d4037)"],
            ["linear-gradient(145deg, #e3d5b8, #c5b390)", "linear-gradient(145deg, #f5ebe0, #d5bdaf)", "linear-gradient(145deg, #ede0d4, #ddb892)"],
            ["linear-gradient(145deg, #fcd34d, #d97706)", "linear-gradient(145deg, #fbbf24, #b45309)", "linear-gradient(145deg, #fde68a, #f59e0b)"],
            ["linear-gradient(145deg, #ffffff, #f3f4f6)", "linear-gradient(145deg, #fafaf9, #e7e5e4)", "linear-gradient(145deg, #fffbeb, #fef3c7)"]
        ];

        function updateValues() {
            const site = document.getElementById('site').value;
            const valueSelect = document.getElementById('value');
            valueSelect.innerHTML = '<option value="" disabled selected>ערך...</option>';
            if (siteValues[site]) {
                siteValues[site].forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v;
                    opt.textContent = v;
                    valueSelect.appendChild(opt);
                });
            }
        }

        function resizeAllStones() {
            const kotel = document.getElementById('kotel');
            const stones = kotel.getElementsByClassName('stone');
            const count = stones.length;
            let sizeClass = 'size-large';
            if (count > 8) sizeClass = 'size-medium';
            if (count > 15) sizeClass = 'size-small';
            if (count > 25) sizeClass = 'size-mini';
            Array.from(stones).forEach(s => {
                s.classList.remove('size-large', 'size-medium', 'size-small', 'size-mini');
                s.classList.add(sizeClass);
            });
        }

        function addStone() {
            const site = document.getElementById('site').value;
            const value = document.getElementById('value').value;
            const action = document.getElementById('action').value.trim();
            if (!site || !value || !action) return;

            const kotel = document.getElementById('kotel');
            const stone = document.createElement('div');
            stone.className = 'stone';
            const familyIndex = Math.floor(Math.random() * stoneColorFamilies.length);
            const family = stoneColorFamilies[familyIndex];
            stone.style.background = family[Math.floor(Math.random() * family.length)];

            stone.innerHTML = `
                <div class="stone-site">${site}</div>
                <div class="stone-value">${value}</div>
                <div class="stone-action">"${action}"</div>
            `;
            kotel.appendChild(stone);
            resizeAllStones();
            document.getElementById('action').value = '';
            const wrapper = document.getElementById('scroll-wrapper');
            setTimeout(() => { wrapper.scrollTop = wrapper.scrollHeight; }, 100);
        }

        async function saveAsImage() {
            const kotel = document.getElementById('kotel');
            if (kotel.children.length === 0) return;
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            const captureArea = document.getElementById('capture-area');
            const wrapper = document.getElementById('scroll-wrapper');
            captureArea.classList.add('export-mode');
            const originalOverflow = wrapper.style.overflowY;
            wrapper.style.overflowY = 'visible';
            try {
                /* --- השינוי השני: הוספת useCORS לאפשר צילום של תמונת רקע משרת מרוחק --- */
                const canvas = await html2canvas(captureArea, { 
                    scale: 2, 
                    backgroundColor: '#fdfaf3',
                    useCORS: true 
                });
                const link = document.createElement('a');
                link.download = 'כותל_הערכים.png';
                link.href = canvas.toDataURL();
                link.click();
            } catch (err) { console.error(err); } finally {
                captureArea.classList.remove('export-mode');
                wrapper.style.overflowY = originalOverflow;
                loader.style.display = 'none';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function showResetDialog() { document.getElementById('confirm-dialog').style.display = 'block'; }
        function closeResetDialog() { document.getElementById('confirm-dialog').style.display = 'none'; }
        function resetWall() {
            document.getElementById('kotel').innerHTML = '';
            document.getElementById('site').selectedIndex = 0;
            document.getElementById('value').innerHTML = '<option value="" disabled selected>ערך...</option>';
            document.getElementById('action').value = '';
            closeResetDialog();
        }

        document.getElementById('action').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addStone();
        });
    </script>
</body>
</html>
